# yaml-language-server: $schema=https://raw.githubusercontent.com/Bahaaio/pomo/main/config/schema.json
# pomo config file
# https://github.com/Bahaaio/pomo

onSessionEnd: ask
countIdleTime: true

asciiArt:
  enabled: true
  font: mono12
  color: "#5A56E0"

work:
  duration: 50m
  title: work session
  notification:
    enabled: true
    urgent: false
    title: work finished 🎉
    message: time to take a break
    # icon: ~/path/to/icon.png
  # then:
  #   - [spd-say, "Time to take a break"]

break:
  duration: 10m
  title: break session
  notification:
    enabled: true
    urgent: false
    title: break over 😴
    message: back to work!
    # icon: C:\Users\path\to\your\icon.png
  # then:
  #   - [spd-say, "Back to work!"]

longBreak:
  enabled: true
  after: 4
  duration: 20m
